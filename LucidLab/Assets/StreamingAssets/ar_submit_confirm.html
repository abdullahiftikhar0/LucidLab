<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Submit Experiment</title>
  <link rel="stylesheet" href="fonts/fonts.css" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  
  <!-- Firebase SDK (compat for plain JS) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <style>
    :root { --primary: #00f2ff; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; width: 100%; overflow: hidden;
      background: transparent;
      font-family: Inter, system-ui, sans-serif;
      -webkit-tap-highlight-color: transparent;
      user-select: none; -webkit-user-select: none;
    }

    /* Full-screen dim overlay — fills the entire WebView */
    .overlay {
      position: fixed; inset: 0; z-index: 10;
      background: rgba(0, 0, 0, 0.70);
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
      animation: fadeIn 0.18s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* The card */
    .modal-box {
      width: 100%; max-width: 340px;
      background: rgba(15, 34, 35, 0.97);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(0, 242, 255, 0.3);
      border-radius: 20px;
      padding: 28px;
      box-shadow:
        0 0 0 1px rgba(0, 242, 255, 0.06) inset,
        0 0 48px rgba(0, 242, 255, 0.12),
        0 24px 48px rgba(0, 0, 0, 0.55);
      position: relative; overflow: hidden;
      animation: slideUp 0.22s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    @keyframes slideUp {
      from { transform: translateY(24px) scale(0.96); opacity: 0; }
      to   { transform: translateY(0)    scale(1);    opacity: 1; }
    }

    /* Decorative glow orb */
    .modal-glow {
      position: absolute; top: -80px; right: -80px;
      width: 200px; height: 200px;
      background: rgba(0, 242, 255, 0.10);
      border-radius: 50%;
      filter: blur(60px);
      pointer-events: none;
    }
    .modal-glow-bottom {
      position: absolute; bottom: -80px; left: -60px;
      width: 160px; height: 160px;
      background: rgba(0, 120, 170, 0.08);
      border-radius: 50%;
      filter: blur(50px);
      pointer-events: none;
    }

    .modal-icon-wrap {
      width: 52px; height: 52px;
      background: rgba(0, 242, 255, 0.12);
      border: 1px solid rgba(0, 242, 255, 0.3);
      border-radius: 14px;
      display: grid; place-items: center;
      margin-bottom: 16px;
    }
    .modal-icon-wrap .material-symbols-outlined { font-size: 28px; color: var(--primary); }

    .modal-title {
      font-size: 20px; font-weight: 700;
      color: #f1f5f9; letter-spacing: -0.02em;
      margin-bottom: 8px;
    }
    .modal-desc {
      font-size: 13px; color: #7f9398;
      line-height: 1.6; margin-bottom: 22px;
    }

    /* Details summary card */
    .modal-details {
      background: rgba(0, 242, 255, 0.05);
      border: 1px solid rgba(0, 242, 255, 0.12);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 22px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .detail-row {
      display: flex; align-items: center; justify-content: space-between;
      font-size: 12px;
    }
    .detail-row .d-label {
      color: #7f9398; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    .detail-row .d-value {
      color: var(--primary); font-weight: 700; font-size: 13px;
    }

    .modal-actions { display: flex; flex-direction: column; gap: 10px; }

    .btn-confirm {
      width: 100%; padding: 15px;
      background: var(--primary); border: none; border-radius: 12px;
      color: #072024; font-family: Inter, sans-serif;
      font-size: 15px; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      box-shadow: 0 0 24px rgba(0, 242, 255, 0.35);
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn-confirm:active { opacity: 0.88; transform: scale(0.98); }
    .btn-confirm .material-symbols-outlined { font-size: 20px; }

    .btn-cancel {
      width: 100%; padding: 13px;
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 12px;
      color: #94a3b8; font-family: Inter, sans-serif;
      font-size: 14px; font-weight: 500; cursor: pointer;
      transition: background 0.15s;
    }
    .btn-cancel:active { background: rgba(255, 255, 255, 0.06); }

    /* Success State Styles */
    #success-state {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      animation: zoomIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    @keyframes zoomIn {
      from { transform: scale(0.8); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .success-icon-container {
      position: relative;
      width: 120px; height: 120px;
      margin-bottom: 24px;
    }

    .success-glow-ring {
      position: absolute; inset: 0;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0, 242, 255, 0.2) 0%, transparent 70%);
      animation: pulseGlow 2s infinite ease-in-out;
    }

    @keyframes pulseGlow {
      0%, 100% { transform: scale(1); opacity: 0.5; }
      50% { transform: scale(1.3); opacity: 0.8; }
    }

    .checkmark-svg {
      width: 100%; height: 100%;
      filter: drop-shadow(0 0 12px rgba(0, 242, 255, 0.5));
    }

    .checkmark-circle {
      stroke: var(--primary);
      stroke-width: 2;
      stroke-dasharray: 166;
      stroke-dashoffset: 166;
      stroke-linecap: round;
      fill: rgba(0, 242, 255, 0.05);
      animation: strokeCircle 0.6s cubic-bezier(0.65, 0, 0.45, 1) forwards;
    }

    .checkmark-check {
      transform-origin: 50% 50%;
      stroke: var(--primary);
      stroke-width: 4;
      stroke-dasharray: 48;
      stroke-dashoffset: 48;
      stroke-linecap: round;
      animation: strokeCheck 0.3s 0.6s cubic-bezier(0.65, 0, 0.45, 1) forwards;
    }

    @keyframes strokeCircle { 100% { stroke-dashoffset: 0; } }
    @keyframes strokeCheck { 100% { stroke-dashoffset: 0; } }

    .success-title {
      font-size: 24px; font-weight: 800;
      color: #fff; letter-spacing: -0.01em;
      margin-bottom: 8px;
    }
    .success-subtitle {
      font-size: 14px; color: #7f9398;
    }
  </style>
</head>
<body>

  <div class="overlay" id="overlay">
    <div class="modal-box" id="modal">
      <div class="modal-glow"></div>
      <div class="modal-glow-bottom"></div>

      <!-- Initial State (Confirmation) -->
      <div id="confirm-state">
        <div class="modal-icon-wrap">
          <span class="material-symbols-outlined">assignment_turned_in</span>
        </div>

        <div class="modal-title">Submit Current Scene</div>
        <p class="modal-desc">
          This submits only your current scene. You can continue working on
          other scenes after this submission.
        </p>

        <div class="modal-details">
          <div class="detail-row">
            <span class="d-label">Status</span>
            <span class="d-value" id="modal-status-val">In Progress</span>
          </div>
          <div class="detail-row">
            <span class="d-label">Scene</span>
            <span class="d-value" id="modal-scene-val">—</span>
          </div>
          <div class="detail-row">
            <span class="d-label">Progress</span>
            <span class="d-value" id="modal-progress-val">—</span>
          </div>
          <div class="detail-row">
            <span class="d-label">Total Scenes</span>
            <span class="d-value" id="modal-total-scenes-val">—</span>
          </div>
          <div class="detail-row">
            <span class="d-label">Submission</span>
            <span class="d-value">Current Scene</span>
          </div>
        </div>

        <div class="modal-actions">
          <button class="btn-confirm" id="btn-confirm" onclick="confirmSubmit()">
            <span class="material-symbols-outlined">send</span>
            Submit Scene
          </button>
          <button class="btn-cancel" onclick="cancelSubmit()">Cancel</button>
        </div>
      </div>

      <!-- Success State -->
      <div id="success-state">
        <div class="success-icon-container">
          <div class="success-glow-ring"></div>
          <svg class="checkmark-svg" viewBox="0 0 52 52">
            <circle class="checkmark-circle" cx="26" cy="26" r="25" fill="none" />
            <path class="checkmark-check" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8" />
          </svg>
        </div>
        <div class="success-title">Success!</div>
        <div class="success-subtitle" id="success-subtitle">Your current scene has been submitted.</div>
      </div>

    </div>
  </div>

  <script>
    /* ==========================================================
       Firebase Init
       ========================================================== */
    firebase.initializeApp({
      apiKey: "AIzaSyCbHACZX4VhFCj45hOr_TlK5KT5yi2dGSs",
      authDomain: "campuspulse0.firebaseapp.com",
      projectId: "campuspulse0",
      storageBucket: "campuspulse0.firebasestorage.app",
      messagingSenderId: "91092596944",
      appId: "1:91092596944:web:4c78dae4fb11db961486d5"
    });
    var db = firebase.firestore();
    var submissionData = null; // To be populated via message context

    function sendToUnity(msg) {
      if (window.Unity && window.Unity.call) {
        window.Unity.call(msg);
      } else if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.unityControl) {
        window.webkit.messageHandlers.unityControl.postMessage(msg);
      } else {
        window.location = "unity:" + msg;
      }
    }

    function clampPercent(value) {
      var n = Number(value);
      if (!isFinite(n)) return 0;
      return Math.max(0, Math.min(100, Math.round(n)));
    }

    function parseStateJson(raw) {
      if (!raw) return null;
      try {
        return JSON.parse(raw);
      } catch (e) {
        console.warn("Failed to parse submission stateJson", e);
        return null;
      }
    }

    function buildVariablesMap(parsedState) {
      var out = {};
      if (!parsedState || !Array.isArray(parsedState.variables)) return out;

      parsedState.variables.forEach(function (entry) {
        if (!entry || typeof entry.key !== "string" || entry.key.length === 0) return;
        out[entry.key] = entry.value == null ? "" : String(entry.value);
      });

      return out;
    }

    function resolveInstructorId(experimentId) {
      if (!experimentId) return Promise.resolve(null);
      return db.collection("experiments").doc(experimentId).get()
        .then(function (doc) {
          if (!doc.exists) return null;
          var data = doc.data() || {};
          return data.instructorId || null;
        })
        .catch(function () { return null; });
    }

    function resolveStudentName(studentId) {
      if (!studentId) return Promise.resolve(null);
      return db.collection("users").doc(studentId).get()
        .then(function (doc) {
          if (!doc.exists) return null;
          var data = doc.data() || {};
          return data.displayName || null;
        })
        .catch(function () { return null; });
    }

    function sanitizeDocPart(value) {
      var raw = value == null ? "unknown" : String(value);
      var cleaned = raw.replace(/[^a-zA-Z0-9_-]/g, "_");
      return cleaned || "unknown";
    }

    function buildSubmissionDocId(studentId, classroomId, experimentId) {
      return [studentId, classroomId, experimentId]
        .map(sanitizeDocPart)
        .join("__");
    }

    function buildSceneKey(sceneName) {
      var normalized = (sceneName == null ? "" : String(sceneName)).trim();
      if (!normalized) normalized = "scene";
      return encodeURIComponent(normalized).replace(/\./g, "%2E");
    }

    function normalizeSceneStatus(status) {
      var s = status == null ? "" : String(status).trim().toLowerCase();
      if (!s) return "in_progress";
      if (s === "in progress") return "in_progress";
      if (s === "needs revision") return "needs_revision";
      return s;
    }

    function getSceneSubmissionsMap(rawMap) {
      if (!rawMap || typeof rawMap !== "object" || Array.isArray(rawMap)) return {};
      var out = {};
      Object.keys(rawMap).forEach(function (key) {
        var entry = rawMap[key];
        if (entry && typeof entry === "object") {
          out[key] = Object.assign({}, entry);
        }
      });
      return out;
    }

    function computeSceneSummary(sceneSubmissions, totalSceneCountHint) {
      var keys = Object.keys(sceneSubmissions || {});
      var submittedWaitingCount = 0;
      var gradedCount = 0;
      var needsRevisionCount = 0;
      var completionTotal = 0;
      var completionCount = 0;

      keys.forEach(function (key) {
        var scene = sceneSubmissions[key] || {};
        var status = normalizeSceneStatus(scene.status);
        if (status === "submitted") {
          submittedWaitingCount += 1;
        } else if (status === "graded" || status === "correct" || status === "incorrect") {
          gradedCount += 1;
        } else if (status === "needs_revision") {
          needsRevisionCount += 1;
        }

        var pct = scene.completionPct;
        if (pct == null) pct = scene.completionPercentage;
        var n = Number(pct);
        if (isFinite(n)) {
          completionTotal += Math.max(0, Math.min(100, n));
          completionCount += 1;
        }
      });

      var submittedOrDoneCount = submittedWaitingCount + gradedCount + needsRevisionCount;
      var totalSceneCount = Number(totalSceneCountHint);
      if (!isFinite(totalSceneCount) || totalSceneCount <= 0) {
        totalSceneCount = Math.max(1, keys.length);
      } else {
        totalSceneCount = Math.round(totalSceneCount);
      }

      var inProgressCount = Math.max(0, totalSceneCount - submittedOrDoneCount);
      var averageCompletionPct = completionCount > 0
        ? Math.round(completionTotal / completionCount)
        : 0;

      return {
        totalSceneCount: totalSceneCount,
        submittedWaitingCount: submittedWaitingCount,
        gradedCount: gradedCount,
        needsRevisionCount: needsRevisionCount,
        inProgressCount: inProgressCount,
        submittedOrDoneCount: submittedOrDoneCount,
        averageCompletionPct: averageCompletionPct
      };
    }

    function computeAggregateStatus(summary) {
      if (!summary) return "in_progress";
      if (summary.needsRevisionCount > 0) return "needs_revision";
      if (summary.submittedOrDoneCount < summary.totalSceneCount) return "in_progress";
      if (summary.submittedWaitingCount > 0) return "submitted";
      if (summary.gradedCount >= summary.totalSceneCount) return "graded";
      return "submitted";
    }

    function confirmSubmit() {
      if (!submissionData) {
        console.error("No submission data available");
        return;
      }

      // Disable the button to prevent double-tap
      var btn = document.getElementById("btn-confirm");
      btn.disabled = true;
      btn.style.opacity = "0.6";

      var stateJson = submissionData.stateJson || "{}";
      var parsedState = parseStateJson(stateJson);
      var completionPct = clampPercent(
        parsedState && parsedState.completionPercentage != null
          ? parsedState.completionPercentage
          : submissionData.progress
      );
      var variables = buildVariablesMap(parsedState);
      var sceneName = "";
      if (submissionData.currentSceneName != null && String(submissionData.currentSceneName).trim()) {
        sceneName = String(submissionData.currentSceneName).trim();
      } else if (parsedState && parsedState.sceneName && String(parsedState.sceneName).trim()) {
        sceneName = String(parsedState.sceneName).trim();
      } else {
        sceneName = "Scene";
      }

      var totalSceneCount = Number(submissionData.totalSceneCount);
      if (!isFinite(totalSceneCount) || totalSceneCount <= 0) {
        totalSceneCount = 1;
      } else {
        totalSceneCount = Math.round(totalSceneCount);
      }

      var submissionDocId = buildSubmissionDocId(
        submissionData.studentId || "unknown",
        submissionData.classroomId || "unknown",
        submissionData.experimentId || "unknown"
      );
      var submissionRef = db.collection("submissions").doc(submissionDocId);
      var timestampNow = firebase.firestore.FieldValue.serverTimestamp();
      var sceneKey = buildSceneKey(sceneName);

      // Upsert one submission document per student/classroom/experiment with nested scene records.
      submissionRef.get().then(function (doc) {
        var existing = doc.exists ? (doc.data() || {}) : {};
        var sceneSubmissions = getSceneSubmissionsMap(existing.sceneSubmissions);
        var previousScene = sceneSubmissions[sceneKey] || {};

        var sceneRecord = Object.assign({}, previousScene, {
          sceneKey: sceneKey,
          sceneName: sceneName,
          status: "submitted",
          completionPct: completionPct,
          completionPercentage: completionPct,
          stateJson: stateJson,
          variables: variables,
          experimentState: {
            completionPercentage: completionPct,
            sceneName: sceneName,
            variables: variables
          },
          updatedAt: timestampNow
        });
        if (sceneRecord.grade == null) sceneRecord.grade = null;
        if (sceneRecord.instructorFeedback == null) sceneRecord.instructorFeedback = "";
        if (!previousScene.submittedAt) {
          sceneRecord.submittedAt = timestampNow;
        }

        sceneSubmissions[sceneKey] = sceneRecord;
        var sceneSummary = computeSceneSummary(sceneSubmissions, totalSceneCount);
        var aggregateStatus = computeAggregateStatus(sceneSummary);

        var submissionPayload = {
          studentId: submissionData.studentId || "unknown",
          experimentId: submissionData.experimentId || "unknown",
          classroomId: submissionData.classroomId || "unknown",
          instructorId: submissionData.instructorId || existing.instructorId || null,
          expname: submissionData.expname || existing.expname || "Untitled",
          experimentName: submissionData.expname || existing.experimentName || existing.expname || "Untitled",
          status: aggregateStatus,
          grade: existing.grade != null ? existing.grade : null,
          instructorFeedback: existing.instructorFeedback || "",
          sceneSubmissions: sceneSubmissions,
          sceneSummary: sceneSummary,
          totalSceneCount: sceneSummary.totalSceneCount,
          latestSceneKey: sceneKey,
          latestSceneName: sceneName,
          stateJson: stateJson,
          completionPct: sceneSummary.averageCompletionPct,
          completionPercentage: sceneSummary.averageCompletionPct,
          sceneName: sceneName,
          variables: variables,
          experimentState: {
            completionPercentage: completionPct,
            sceneName: sceneName,
            variables: variables
          },
          recordingUrl: existing.recordingUrl || "",
          updatedAt: timestampNow,
          latestSubmittedAt: timestampNow
        };

        if (!existing.submittedAt) submissionPayload.submittedAt = timestampNow;
        if (!doc.exists) submissionPayload.createdAt = timestampNow;

        return submissionRef.set(submissionPayload, { merge: true }).then(function () {
          return {
            sceneSummary: sceneSummary,
            submissionPayload: submissionPayload,
            submissionId: submissionDocId,
            docExists: doc.exists
          };
        });
      })
      .then(function (result) {
        console.log("Scene submission upserted:", result.submissionId);

        Promise.all([
          result.submissionPayload.instructorId
            ? Promise.resolve(result.submissionPayload.instructorId)
            : resolveInstructorId(result.submissionPayload.experimentId),
          submissionData.studentName
            ? Promise.resolve(submissionData.studentName)
            : resolveStudentName(result.submissionPayload.studentId)
        ])
        .then(function(values) {
          var instructorId = values[0];
          var studentName = values[1] || "A student";
          if (!instructorId) return;

          if (!result.submissionPayload.instructorId) {
            result.submissionPayload.instructorId = instructorId;
            db.collection("submissions").doc(result.submissionId).update({ instructorId: instructorId }).catch(function() {});
          }

          return db.collection("notifications").add({
            userId: instructorId,
            type: "submission_received",
            title: "Scene Submission Received",
            message: studentName + " submitted scene \"" + sceneName + "\" for " + (result.submissionPayload.experimentName || "an experiment"),
            link: "/evaluation/" + result.submissionPayload.classroomId + "/" + result.submissionPayload.experimentId,
            isRead: false,
            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
            data: {
              classroomId: result.submissionPayload.classroomId,
              experimentId: result.submissionPayload.experimentId,
              submissionId: result.submissionId,
              studentId: result.submissionPayload.studentId,
              sceneName: sceneName,
              sceneKey: sceneKey
            }
          });
        })
        .catch(function(e) {
          console.error("Notif failed:", e);
        });

        // Transition to success state
        document.getElementById("confirm-state").style.display = "none";
        document.getElementById("success-state").style.display = "flex";
        var successSubtitle = document.getElementById("success-subtitle");
        if (successSubtitle) {
          successSubtitle.textContent = "Scene \"" + sceneName + "\" has been submitted.";
        }
        
        // Wait for animation to play before notifying Unity
        setTimeout(function() {
          sendToUnity("submission_success");
        }, 2000);
      })
      .catch(function(error) {
        console.error("Submission failed:", error);
        btn.disabled = false;
        btn.style.opacity = "1.0";
        sendToUnity("submission_failed:" + error.message);
      });
    }

    function cancelSubmit() {
      sendToUnity("close_submit_confirm");
    }

    /*
     * Unity (ARHudController) pushes live context data
     * Format: { type: "confirm_context", progress: 75, status: "In Progress", studentId: "...", ... }
     */
    window.addEventListener("message", function (e) {
      var d = e.data;
      if (d && typeof d === "object" && d.type === "confirm_context") {
        submissionData = d;
        if (d.progress != null) {
          var pEl = document.getElementById("modal-progress-val");
          if (pEl) pEl.textContent = Math.round(d.progress) + "%";
        }
        if (d.currentSceneName != null) {
          var sceneEl = document.getElementById("modal-scene-val");
          if (sceneEl) sceneEl.textContent = d.currentSceneName || "—";
        }
        if (d.totalSceneCount != null) {
          var totalScenesEl = document.getElementById("modal-total-scenes-val");
          if (totalScenesEl) totalScenesEl.textContent = String(Math.max(1, Math.round(Number(d.totalSceneCount) || 1)));
        }
        if (d.status != null) {
          var sEl = document.getElementById("modal-status-val");
          if (sEl) sEl.textContent = d.status;
        }
      }
    });

    // Tell Unity we're loaded and ready for context data
    sendToUnity("confirm_ready");
  </script>
</body>
</html>
