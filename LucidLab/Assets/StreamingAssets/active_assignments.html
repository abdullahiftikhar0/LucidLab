<!DOCTYPE html>

<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>LucidLab - Student Assignments</title>
  <link rel="stylesheet" href="fonts/fonts.css" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "var(--accent, #00f2ff)",
                        "background-light": "#f5f8f8",
                        "background-dark": "#0f2223",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        :root { --accent: #00f2ff; --text-scale: 1; }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 252, 255, 0.1);
        }

        .neon-glow {
            box-shadow: 0 0 15px color-mix(in srgb, var(--accent) 40%, transparent);
        }

        .neon-text-glow {
            text-shadow: 0 0 8px color-mix(in srgb, var(--accent) 50%, transparent);
        }

        /* Experiment detail screen */
        .exp-detail-screen {
            position: fixed; inset: 0; z-index: 250;
            background: #0f2223;
            transform: translateX(100%);
            transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
            overflow-y: auto; display: flex; flex-direction: column;
        }
        .exp-detail-screen.open { transform: translateX(0); }
        .detail-header {
            position: sticky; top: 0; z-index: 10;
            background: rgba(15, 34, 35, 0.85);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid color-mix(in srgb, var(--accent) 10%, transparent);
            padding: 16px; display: flex; align-items: center; gap: 12px;
        }
        .detail-header .back-circle {
            width: 40px; height: 40px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            background: transparent; border: none; color: #f1f5f9; cursor: pointer;
            transition: background 0.15s;
        }
        .detail-header .back-circle:hover { background: color-mix(in srgb, var(--accent) 10%, transparent); }
        .detail-hero {
            position: relative; height: 160px;
            background: linear-gradient(135deg, color-mix(in srgb, var(--accent) 30%, transparent), rgba(99,102,241,0.3), #0f2223);
            display: flex; align-items: flex-end; padding: 24px; overflow: hidden;
        }
        .detail-hero::before {
            content: ''; position: absolute; inset: 0;
            background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            opacity: 0.08;
        }
        .detail-body { padding: 20px 16px 100px; flex: 1; }
        .detail-stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
        .detail-stat {
            background: rgba(22, 44, 45, 0.7); backdrop-filter: blur(12px);
            border: 1px solid color-mix(in srgb, var(--accent) 10%, transparent);
            border-radius: 0.75rem; padding: 14px;
            display: flex; align-items: center; gap: 12px;
        }
        .detail-stat .ds-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .detail-stat .ds-label { font-size: 10px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; }
        .detail-stat .ds-value { font-size: 16px; color: #f1f5f9; font-weight: 700; margin-top: 2px; }
        .detail-section-title { font-size: 13px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
        .detail-desc { font-size: 14px; color: #cbd5e1; line-height: 1.65; margin-bottom: 24px; }
        .feedback-card {
            background: rgba(22, 44, 45, 0.7); backdrop-filter: blur(12px);
            border: 1px solid rgba(99,102,241,0.2); border-radius: 0.75rem;
            padding: 16px; margin-bottom: 24px;
        }
        .feedback-card .fb-label { font-size: 11px; color: #6366f1; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 700; margin-bottom: 6px; }
        .feedback-card .fb-text { font-size: 14px; color: #e2e8f0; line-height: 1.6; }
        .detail-launch-bar {
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 260;
            background: rgba(15, 34, 35, 0.92); backdrop-filter: blur(16px);
            border-top: 1px solid color-mix(in srgb, var(--accent) 10%, transparent);
            padding: 16px; transform: translateX(100%);
            transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
        }
        .detail-launch-bar.open { transform: translateX(0); }
        .progress-track { width: 100%; height: 6px; background: rgba(255,255,255,0.08); border-radius: 999px; overflow: hidden; margin-top: 6px; }
        .progress-fill { height: 100%; border-radius: 999px; background: linear-gradient(90deg, var(--accent), #6366f1); transition: width 0.6s ease; }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
            font-size: calc(16px * var(--text-scale));
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
    <!-- Top App Bar -->
    <header
        class="sticky top-0 z-10 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md px-4 py-4 border-b border-primary/10">
        <div class="flex items-center justify-between">
            <div class="w-10"></div> <!-- Spacer -->
            <h1 class="text-lg font-bold tracking-tight text-slate-900 dark:text-slate-100">My Experiments</h1>
            <button
                class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-primary/10 transition-colors">
                <span class="material-symbols-outlined text-slate-900 dark:text-slate-100">filter_list</span>
            </button>
        </div>
    </header>
    <!-- Tabs / Segmented Control -->
    <div class="px-4 mt-6">
        <div class="flex p-1 bg-slate-200/50 dark:bg-slate-800/50 rounded-xl">
            <button
                class="flex-1 py-2 text-sm font-semibold rounded-lg bg-white dark:bg-slate-700 text-slate-900 dark:text-white shadow-sm ring-1 ring-black/5">
                To Do
            </button>
            <button
                class="flex-1 py-2 text-sm font-semibold rounded-lg text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 transition-all">
                Completed
            </button>
        </div>
    </div>
    <!-- Main Content: Task List -->
    <main class="flex-1 px-4 py-6 space-y-4 overflow-y-auto">
        <div id="assignments-list"></div>
        <div id="empty-state" class="hidden flex flex-col items-center justify-center py-16 text-center">
            <span class="material-symbols-outlined text-5xl text-slate-600 mb-3">check_circle</span>
            <p class="text-slate-400 text-sm">No active assignments.<br>You’re all caught up!</p>
        </div>
    </main>

    <!-- Experiment Detail Screen -->
    <div id="exp-detail" class="exp-detail-screen">
        <div class="detail-header">
            <button id="detail-back" class="back-circle">
                <span class="material-symbols-outlined">arrow_back</span>
            </button>
            <h1 id="detail-title" class="text-lg font-bold tracking-tight text-slate-100 truncate">Experiment</h1>
        </div>
        <div class="detail-hero">
            <div class="relative z-10">
                <span id="detail-category" class="px-3 py-1 rounded-full bg-primary/20 border border-primary text-primary text-xs font-bold tracking-widest uppercase mb-2 inline-block"></span>
                <h2 id="detail-hero-title" class="text-3xl font-black text-white tracking-tight neon-text-glow"></h2>
            </div>
        </div>
        <div class="detail-body">
            <div class="flex items-center gap-3 mb-5">
                <span id="detail-status-badge" class="px-3 py-1 rounded-lg text-xs font-bold border"></span>
                <span id="detail-date" class="text-xs text-slate-500"></span>
            </div>
            <div id="detail-stats" class="detail-stat-grid"></div>
            <div id="detail-desc-section">
                <h4 class="detail-section-title">Description</h4>
                <p id="detail-desc" class="detail-desc"></p>
            </div>
            <div id="detail-feedback-section" class="hidden">
                <h4 class="detail-section-title">Instructor Feedback</h4>
                <div class="feedback-card">
                    <div class="fb-label">Feedback</div>
                    <div id="detail-feedback" class="fb-text"></div>
                </div>
            </div>
        </div>
    </div>
    <div id="detail-launch-bar" class="detail-launch-bar">
        <button id="detail-ar-btn" class="w-full bg-primary hover:bg-primary/90 text-background-dark font-bold py-3.5 rounded-xl flex items-center justify-center gap-2 transition-all active:scale-[0.98] text-base">
            <span class="material-symbols-outlined text-xl">play_arrow</span>
            <span id="detail-ar-label">Launch AR</span>
        </button>
    </div>

    <script>
    (function () {
      // Hide bottom nav — shell provides its own
      var nav = document.querySelector("nav");
      if (nav) nav.style.display = "none";
      var main = document.querySelector("main");
      if (main) main.style.paddingBottom = "16px";

      // "Completed" tab → navigate to completed screen
      var tabs = document.querySelectorAll("button");
      tabs.forEach(function (btn) {
        if (btn.textContent.trim() === "Completed") {
          btn.addEventListener("click", function (e) {
            e.preventDefault(); e.stopPropagation();
            parent.postMessage("navigate:completed", "*");
          });
        }
      });

      function esc(s) {
        var d = document.createElement("div");
        d.appendChild(document.createTextNode(s));
        return d.innerHTML;
      }

      // ===== Experiment Detail Screen =====
      var expDetailScreen = document.getElementById("exp-detail");
      var detailLaunchBar = document.getElementById("detail-launch-bar");
      var currentDetailExp = null;

      function openExpDetail(exp) {
        currentDetailExp = exp;
        var sub = exp.submission;

        document.getElementById("detail-title").textContent = exp.title || exp.name || "Experiment";
        document.getElementById("detail-hero-title").textContent = exp.title || exp.name || "Experiment";
        document.getElementById("detail-category").textContent = exp.category || (exp.classroom && exp.classroom.subject) || "";

        // Status badge
        var statusBadge = document.getElementById("detail-status-badge");
        var status, sBg, sText;
        if (sub && (sub.status === "in_progress" || sub.status === "submitted")) {
          status = sub.status === "submitted" ? "Submitted" : "In Progress";
          sBg = "bg-yellow-400/10"; sText = "text-yellow-400 border-yellow-400/20";
        } else {
          status = "Not Started"; sBg = "bg-slate-500/10"; sText = "text-slate-400 border-slate-600";
        }
        statusBadge.className = "px-3 py-1 rounded-lg text-xs font-bold border " + sBg + " " + sText;
        statusBadge.textContent = status;

        // Date
        var dateEl = document.getElementById("detail-date");
        if (sub && sub.submittedAt) {
          var d2 = sub.submittedAt.toDate ? sub.submittedAt.toDate() : new Date(sub.submittedAt);
          dateEl.textContent = "Submitted " + d2.toLocaleDateString();
        } else { dateEl.textContent = ""; }

        // Stats grid
        var statsEl = document.getElementById("detail-stats");
        statsEl.innerHTML = "";
        var stats = [];

        var pct = 0;
        if (sub && sub.experimentState && sub.experimentState.completionPercentage != null) pct = sub.experimentState.completionPercentage;
        else if (sub && sub.completionPercentage != null) pct = sub.completionPercentage;
        stats.push({ icon: "trending_up", bg: "color-mix(in srgb, var(--accent) 10%, transparent)", color: "var(--accent)", label: "Progress", value: pct + "%", extra: '<div class="progress-track"><div class="progress-fill" style="width:' + pct + '%"></div></div>' });

        if (sub && sub.quizScore != null) {
          stats.push({ icon: "quiz", bg: "color-mix(in srgb, var(--accent) 10%, transparent)", color: "var(--accent)", label: "Quiz Score", value: sub.quizScore + "%" });
        }

        if (sub && sub.experimentState && sub.experimentState.completedSteps != null) {
          stats.push({ icon: "checklist", bg: "rgba(99,102,241,0.1)", color: "#6366f1", label: "Steps", value: sub.experimentState.completedSteps + " / " + (sub.experimentState.totalSteps || "?") });
        }

        if (stats.length % 2 !== 0) {
          stats.push({ icon: "science", bg: "color-mix(in srgb, var(--accent) 10%, transparent)", color: "var(--accent)", label: "Scenes", value: "AR" });
        }

        stats.forEach(function (s) {
          var div = document.createElement("div");
          div.className = "detail-stat";
          div.innerHTML =
            '<div class="ds-icon" style="background:' + s.bg + ';color:' + s.color + '">' +
              '<span class="material-symbols-outlined" style="font-size:20px">' + s.icon + '</span>' +
            '</div>' +
            '<div style="flex:1;min-width:0">' +
              '<div class="ds-label">' + s.label + '</div>' +
              '<div class="ds-value">' + s.value + '</div>' +
              (s.extra || '') +
            '</div>';
          statsEl.appendChild(div);
        });

        // Description
        var descSection = document.getElementById("detail-desc-section");
        var descText = exp.description || "";
        if (descText) {
          descSection.classList.remove("hidden");
          document.getElementById("detail-desc").textContent = descText;
        } else { descSection.classList.add("hidden"); }

        // Instructor Feedback
        var fbSection = document.getElementById("detail-feedback-section");
        if (sub && sub.instructorFeedback) {
          fbSection.classList.remove("hidden");
          document.getElementById("detail-feedback").textContent = sub.instructorFeedback;
        } else { fbSection.classList.add("hidden"); }

        // AR button label
        var arLabel = document.getElementById("detail-ar-label");
        if (sub && (sub.status === "in_progress" || sub.status === "submitted")) {
          arLabel.textContent = "Continue AR";
        } else {
          arLabel.textContent = "Launch AR";
        }

        expDetailScreen.classList.add("open");
        detailLaunchBar.classList.add("open");
      }

      function closeExpDetail() {
        expDetailScreen.classList.remove("open");
        detailLaunchBar.classList.remove("open");
        currentDetailExp = null;
      }

      document.getElementById("detail-back").addEventListener("click", function (e) {
        e.preventDefault();
        closeExpDetail();
      });

      document.getElementById("detail-ar-btn").addEventListener("click", function (e) {
        e.preventDefault();
        if (!currentDetailExp) return;
        var sub = currentDetailExp.submission;
        var mode = "launch";
        if (sub && (sub.status === "in_progress" || sub.status === "submitted")) mode = "continue";
        parent.postMessage("unity:start_ar:" + JSON.stringify({ experimentId: currentDetailExp.id, title: currentDetailExp.title || currentDetailExp.name, mode: mode }), "*");
      });

      function renderAssignments(experiments) {
        var list = document.getElementById("assignments-list");
        var empty = document.getElementById("empty-state");
        list.innerHTML = "";

        if (!experiments || experiments.length === 0) {
          empty.classList.remove("hidden");
          return;
        }
        empty.classList.add("hidden");

        experiments.forEach(function (exp) {
          var hasSubmission = exp.submission && (exp.submission.status === "in_progress" || exp.submission.status === "submitted");
          var statusLabel = hasSubmission ? "In Progress" : "Not Started";
          var statusColor = hasSubmission ? "text-amber-400 bg-amber-400/10" : "text-slate-400 bg-slate-500/10";
          var borderColor = hasSubmission ? "border-l-yellow-400" : "border-l-slate-500";
          var pct = (exp.submission && exp.submission.completionPercentage) || 0;
          var classroomName = (exp.classroom && exp.classroom.name) || "";
          var btnLabel = hasSubmission ? "Continue AR" : "Launch AR";

          var card = document.createElement("div");
          card.className = "glass-card rounded-xl p-4 border-l-4 cursor-pointer active:scale-[0.98] transition-transform mb-4 " + borderColor;
          card.innerHTML =
            '<div class="flex justify-between items-start mb-1">' +
              '<div class="min-w-0 flex-1 mr-2">' +
                '<span class="text-[10px] font-bold text-primary uppercase tracking-widest">' + esc(classroomName) + '</span>' +
                '<h3 class="text-base font-bold leading-tight truncate">' + esc(exp.title || exp.name || "Experiment") + '</h3>' +
              '</div>' +
              '<span class="px-2 py-1 rounded-lg shrink-0 ' + statusColor + ' text-[10px] font-bold border border-current/20">' + statusLabel + '</span>' +
            '</div>' +
            (pct > 0 ? '<div class="progress-track mb-3"><div class="progress-fill" style="width:' + pct + '%"></div></div>' : '<div class="mb-3"></div>') +
            '<button class="ar-btn w-full bg-primary hover:bg-primary/90 text-background-dark font-bold py-2.5 rounded-lg flex items-center justify-center gap-2 transition-all active:scale-[0.98]">' +
              '<span class="material-symbols-outlined text-lg">play_arrow</span> ' + btnLabel +
            '</button>';

          // Card tap → detail screen
          (function (capturedExp) {
            card.addEventListener("click", function () {
              openExpDetail(capturedExp);
            });
          })(exp);

          // AR button keeps direct launch
          card.querySelector(".ar-btn").addEventListener("click", function (e) {
            e.stopPropagation();
            var mode = hasSubmission ? "continue" : "launch";
            parent.postMessage("unity:start_ar:" + JSON.stringify({ experimentId: exp.id, title: exp.title || exp.name, mode: mode }), "*");
          });
          list.appendChild(card);
        });
      }

      window.addEventListener("message", function (e) {
        var d = e.data;
        if (d && typeof d === "object" && d.type === "assignments") renderAssignments(d.data);
      });
    })();
    </script>
<script src="preferences.js"></script>
</body>

</html>
