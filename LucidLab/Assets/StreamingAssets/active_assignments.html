<!DOCTYPE html>

<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>LucidLab - Student Assignments</title>
  <link rel="stylesheet" href="fonts/fonts.css" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "var(--accent, #00f2ff)",
                        "background-light": "#f5f8f8",
                        "background-dark": "#0f2223",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        :root { --accent: #00f2ff; --text-scale: 1; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .neon-glow-primary {
            box-shadow: 0 0 15px color-mix(in srgb, var(--accent) 30%, transparent);
        }
        body { font-size: calc(16px * var(--text-scale)); }
        .neon-glow-success {
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.2);
        }

        /* Experiment detail screen */
        .exp-detail-screen {
            position: fixed; inset: 0; z-index: 250;
            background: #0f2223;
            transform: translateX(100%);
            transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
            overflow-y: auto; display: flex; flex-direction: column;
        }
        .exp-detail-screen.open { transform: translateX(0); }
        .detail-header {
            position: sticky; top: 0; z-index: 10;
            background: rgba(15, 34, 35, 0.85);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid color-mix(in srgb, var(--accent) 10%, transparent);
            padding: 16px; display: flex; align-items: center; gap: 12px;
        }
        .detail-header .back-circle {
            width: 40px; height: 40px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            background: transparent; border: none; color: #f1f5f9; cursor: pointer;
            transition: background 0.15s;
        }
        .detail-header .back-circle:hover { background: color-mix(in srgb, var(--accent) 10%, transparent); }
        .detail-hero {
            position: relative; height: 160px;
            background: linear-gradient(135deg, color-mix(in srgb, var(--accent) 30%, transparent), rgba(99,102,241,0.3), #0f2223);
            display: flex; align-items: flex-end; padding: 24px; overflow: hidden;
        }
        .detail-hero::before {
            content: ''; position: absolute; inset: 0;
            background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            opacity: 0.08;
        }
        .detail-body { padding: 20px 16px 100px; flex: 1; }
        .detail-stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
        .detail-stat {
            background: rgba(22, 44, 45, 0.7); backdrop-filter: blur(12px);
            border: 1px solid color-mix(in srgb, var(--accent) 10%, transparent);
            border-radius: 0.75rem; padding: 14px;
            display: flex; align-items: center; gap: 12px;
        }
        .detail-stat .ds-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .detail-stat .ds-label { font-size: 10px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; }
        .detail-stat .ds-value { font-size: 16px; color: #f1f5f9; font-weight: 700; margin-top: 2px; }
        .detail-section-title { font-size: 13px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
        .detail-desc { font-size: 14px; color: #cbd5e1; line-height: 1.65; margin-bottom: 24px; }
        .feedback-card {
            background: rgba(22, 44, 45, 0.7); backdrop-filter: blur(12px);
            border: 1px solid rgba(99,102,241,0.2); border-radius: 0.75rem;
            padding: 16px; margin-bottom: 24px;
        }
        .feedback-card .fb-label { font-size: 11px; color: #6366f1; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 700; margin-bottom: 6px; }
        .feedback-card .fb-text { font-size: 14px; color: #e2e8f0; line-height: 1.6; }
        .detail-launch-bar {
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 260;
            background: rgba(15, 34, 35, 0.92); backdrop-filter: blur(16px);
            border-top: 1px solid color-mix(in srgb, var(--accent) 10%, transparent);
            padding: 16px; transform: translateX(100%);
            transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
        }
        .detail-launch-bar.open { transform: translateX(0); }
        .progress-fill { height: 100%; border-radius: 999px; background: linear-gradient(90deg, var(--accent), #6366f1); transition: width 0.6s ease; }

        /* Skeleton Shimmer */
        .skeleton {
          background: rgba(255, 255, 255, 0.05);
          border-radius: 6px;
          position: relative;
          overflow: hidden;
        }
        .skeleton::after {
          content: "";
          position: absolute;
          inset: 0;
          background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.05), transparent);
          animation: shimmer 2s infinite;
          transform: translateX(-100%);
        }
        @keyframes shimmer {
          100% { transform: translateX(100%); }
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
            font-size: calc(16px * var(--text-scale));
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
    <header class="sticky top-0 z-50 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800">
        <div class="flex items-center justify-between p-4 h-16">
            <button id="header-back" class="flex items-center justify-center size-10 rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors">
                <span class="material-symbols-outlined text-slate-600 dark:text-slate-400">arrow_back</span>
            </button>
            <h1 class="text-lg font-bold tracking-tight text-slate-900 dark:text-white">My Experiments</h1>
            <button class="flex items-center justify-center size-10 rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors">
                <span class="material-symbols-outlined text-primary">filter_list</span>
            </button>
        </div>
    </header>
    <!-- Segmented Control / Tabs -->
    <div class="px-4 mt-4 mb-6">
        <div class="flex p-1 bg-slate-200/50 dark:bg-slate-800/50 rounded-xl">
            <button class="flex-1 py-2 text-sm font-semibold rounded-lg bg-white dark:bg-slate-700 text-slate-900 dark:text-white shadow-sm ring-1 ring-black/5">
                To Do
            </button>
            <button id="tab-completed" class="flex-1 py-2 text-sm font-semibold rounded-lg text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 transition-all">
                Completed
            </button>
        </div>
    </div>
    <!-- Main Content Area -->
    <main class="flex-1 overflow-y-auto px-4 pb-24">
        <!-- Section Title -->
        <div id="assignments-list" class="space-y-4">
            <!-- Loading Skeletons -->
            <div id="skeleton-container" class="space-y-4">
                <div class="glass-panel p-4 rounded-xl flex flex-col gap-4">
                    <div class="flex items-center gap-4">
                        <div class="skeleton size-16 rounded-lg"></div>
                        <div class="flex-1 space-y-2">
                            <div class="skeleton h-2 w-16"></div>
                            <div class="skeleton h-4 w-3/4"></div>
                            <div class="skeleton h-3 w-20"></div>
                        </div>
                    </div>
                    <div class="skeleton h-10 w-full"></div>
                </div>
                <div class="glass-panel p-4 rounded-xl flex flex-col gap-4 opacity-60">
                    <div class="flex items-center gap-4">
                        <div class="skeleton size-16 rounded-lg"></div>
                        <div class="flex-1 space-y-2">
                            <div class="skeleton h-2 w-12"></div>
                            <div class="skeleton h-4 w-1/2"></div>
                        </div>
                    </div>
                    <div class="skeleton h-10 w-full"></div>
                </div>
            </div>
        </div>
        <div id="empty-state" class="hidden flex flex-col items-center justify-center py-16 text-center">
            <span class="material-symbols-outlined text-5xl text-slate-600 mb-3">emoji_events</span>
            <p class="text-slate-400 text-sm">No active assignments.<br>You’re all caught up!</p>
        </div>
    </main>

    <!-- Experiment Detail Screen -->
    <div id="exp-detail" class="exp-detail-screen">
        <div class="detail-header">
            <button id="detail-back" class="back-circle">
                <span class="material-symbols-outlined">arrow_back</span>
            </button>
            <h1 id="detail-title" class="text-lg font-bold tracking-tight text-slate-100 truncate">Experiment</h1>
        </div>
        <div class="detail-hero">
            <div class="relative z-10">
                <span id="detail-category" class="px-3 py-1 rounded-full bg-primary/20 border border-primary text-primary text-xs font-bold tracking-widest uppercase mb-2 inline-block"></span>
                <h2 id="detail-hero-title" class="text-3xl font-black text-white tracking-tight neon-text-glow"></h2>
            </div>
        </div>
        <div class="detail-body">
            <div class="flex items-center gap-3 mb-5">
                <span id="detail-status-badge" class="px-3 py-1 rounded-lg text-xs font-bold border"></span>
                <span id="detail-date" class="text-xs text-slate-500"></span>
            </div>
            <div id="detail-stats" class="detail-stat-grid"></div>
            <div id="detail-desc-section">
                <h4 class="detail-section-title">Description</h4>
                <p id="detail-desc" class="detail-desc"></p>
            </div>
            <div id="detail-feedback-section" class="hidden">
                <h4 class="detail-section-title">Instructor Feedback</h4>
                <div class="feedback-card">
                    <div class="fb-label">Feedback</div>
                    <div id="detail-feedback" class="fb-text"></div>
                </div>
            </div>
        </div>
    </div>
    <div id="detail-launch-bar" class="detail-launch-bar">
        <button id="detail-ar-btn" class="w-full bg-primary hover:bg-primary/90 text-background-dark font-bold py-3.5 rounded-xl flex items-center justify-center gap-2 transition-all active:scale-[0.98] text-base">
            <span class="material-symbols-outlined text-xl">play_arrow</span>
            <span id="detail-ar-label">Launch AR</span>
        </button>
    </div>

    <script>
    (function () {
      // Hide bottom nav — shell provides its own
      var nav = document.querySelector("nav");
      if (nav) nav.style.display = "none";
      var main = document.querySelector("main");
      if (main) main.style.paddingBottom = "16px";

      // "Completed" tab
      var completedBtn = document.getElementById("tab-completed");
      if (completedBtn) {
        completedBtn.addEventListener("click", function (e) {
          e.preventDefault(); e.stopPropagation();
          parent.postMessage("navigate:completed", "*");
        });
      }
 
      // Back button
      var backBtn = document.getElementById("header-back");
      if (backBtn) {
        backBtn.addEventListener("click", function (e) {
          e.preventDefault(); e.stopPropagation();
          parent.postMessage("navigate:home", "*");
        });
      }

      function esc(s) {
        var d = document.createElement("div");
        d.appendChild(document.createTextNode(s));
        return d.innerHTML;
      }

      function normalizeStatus(status) {
        var s = status == null ? "" : String(status).trim().toLowerCase();
        if (!s) return "in_progress";
        if (s === "in progress") return "in_progress";
        if (s === "needs revision") return "needs_revision";
        return s;
      }

      function getSceneSummary(sub) {
        if (!sub || typeof sub !== "object") return null;
        var raw = sub.sceneSummary;
        if (raw && typeof raw === "object") {
          var total = Number(raw.totalSceneCount);
          if (isFinite(total) && total > 0) {
            return {
              totalSceneCount: Math.max(1, Math.round(total)),
              submittedWaitingCount: Math.max(0, Math.round(Number(raw.submittedWaitingCount) || 0)),
              gradedCount: Math.max(0, Math.round(Number(raw.gradedCount) || 0)),
              needsRevisionCount: Math.max(0, Math.round(Number(raw.needsRevisionCount) || 0)),
              inProgressCount: Math.max(0, Math.round(Number(raw.inProgressCount) || 0)),
              submittedOrDoneCount: Math.max(0, Math.round(Number(raw.submittedOrDoneCount) || 0))
            };
          }
        }

        if (!sub.sceneSubmissions || typeof sub.sceneSubmissions !== "object") return null;
        var keys = Object.keys(sub.sceneSubmissions);
        if (!keys.length) return null;

        var submittedWaitingCount = 0;
        var gradedCount = 0;
        var needsRevisionCount = 0;

        keys.forEach(function (key) {
          var scene = sub.sceneSubmissions[key] || {};
          var status = normalizeStatus(scene.status);
          if (status === "submitted") submittedWaitingCount += 1;
          else if (status === "graded" || status === "correct" || status === "incorrect") gradedCount += 1;
          else if (status === "needs_revision") needsRevisionCount += 1;
        });

        var submittedOrDoneCount = submittedWaitingCount + gradedCount + needsRevisionCount;
        var totalSceneCount = Number(sub.totalSceneCount);
        if (!isFinite(totalSceneCount) || totalSceneCount <= 0) totalSceneCount = keys.length;

        return {
          totalSceneCount: Math.max(1, Math.round(totalSceneCount)),
          submittedWaitingCount: submittedWaitingCount,
          gradedCount: gradedCount,
          needsRevisionCount: needsRevisionCount,
          inProgressCount: Math.max(0, Math.round(totalSceneCount) - submittedOrDoneCount),
          submittedOrDoneCount: submittedOrDoneCount
        };
      }

      function getEffectiveStatus(sub) {
        var summary = getSceneSummary(sub);
        if (summary) {
          if (summary.needsRevisionCount > 0) return "needs_revision";
          if (summary.submittedOrDoneCount < summary.totalSceneCount) return "in_progress";
          if (summary.submittedWaitingCount > 0) return "submitted";
          if (summary.gradedCount >= summary.totalSceneCount) return "graded";
        }
        return normalizeStatus(sub && (sub.effectiveStatus || sub.status));
      }

      function getSceneSummaryText(sub) {
        var summary = getSceneSummary(sub);
        if (!summary) return "No scene submissions yet";
        var base = summary.submittedOrDoneCount + "/" + summary.totalSceneCount + " scenes submitted";
        if (summary.needsRevisionCount > 0) return base + " • " + summary.needsRevisionCount + " need revision";
        if (summary.submittedWaitingCount > 0) return base + " • Awaiting grade";
        if (summary.gradedCount >= summary.totalSceneCount) return base + " • Fully graded";
        return base;
      }

      function getPrimaryFeedback(sub) {
        if (!sub) return "";
        if (sub.instructorFeedback) return sub.instructorFeedback;
        if (!sub.sceneSubmissions || typeof sub.sceneSubmissions !== "object") return "";
        var entries = Object.keys(sub.sceneSubmissions).map(function (key) {
          return sub.sceneSubmissions[key] || {};
        });
        for (var i = 0; i < entries.length; i += 1) {
          var scene = entries[i];
          if (scene.instructorFeedback) {
            var sceneName = scene.sceneName ? String(scene.sceneName) : "Scene";
            return sceneName + ": " + scene.instructorFeedback;
          }
        }
        return "";
      }

      function getProgressPct(sub) {
        var pct = 0;
        if (sub && sub.experimentState && sub.experimentState.completionPercentage != null) {
          pct = Number(sub.experimentState.completionPercentage);
        } else if (sub && sub.completionPercentage != null) {
          pct = Number(sub.completionPercentage);
        } else if (sub && sub.sceneSubmissions && typeof sub.sceneSubmissions === "object") {
          var keys = Object.keys(sub.sceneSubmissions);
          if (keys.length) {
            var total = 0;
            var count = 0;
            keys.forEach(function (key) {
              var scene = sub.sceneSubmissions[key] || {};
              var value = Number(scene.completionPct != null ? scene.completionPct : scene.completionPercentage);
              if (isFinite(value)) {
                total += value;
                count += 1;
              }
            });
            if (count > 0) pct = total / count;
          }
        }
        if (!isFinite(pct)) pct = 0;
        return Math.max(0, Math.min(100, Math.round(pct)));
      }

      function resolveLaunchMode(sub) {
        var status = getEffectiveStatus(sub);
        if (status === "graded" || status === "correct") return "review";
        if (status === "submitted") return "view";
        if (status === "needs_revision") return "retake";
        if (status === "in_progress") return "continue";
        return "launch";
      }

      // ===== Experiment Detail Screen =====
      var expDetailScreen = document.getElementById("exp-detail");
      var detailLaunchBar = document.getElementById("detail-launch-bar");
      var currentDetailExp = null;

      function openExpDetail(exp) {
        currentDetailExp = exp;
        var sub = exp.submission;
        var effectiveStatus = getEffectiveStatus(sub);
        var sceneSummary = getSceneSummary(sub);

        document.getElementById("detail-title").textContent = exp.title || exp.name || "Experiment";
        document.getElementById("detail-hero-title").textContent = exp.title || exp.name || "Experiment";
        document.getElementById("detail-category").textContent = exp.category || (exp.classroom && exp.classroom.subject) || "";

        // Status badge
        var statusBadge = document.getElementById("detail-status-badge");
        var status, sBg, sText;
        if (effectiveStatus === "graded" || effectiveStatus === "correct") {
          status = "Graded"; sBg = "bg-emerald-400/10"; sText = "text-emerald-500 border-emerald-500/20";
        } else if (effectiveStatus === "submitted") {
          status = "Submitted"; sBg = "bg-cyan-400/10"; sText = "text-cyan-400 border-cyan-400/20";
        } else if (effectiveStatus === "needs_revision") {
          status = "Needs Revision"; sBg = "bg-amber-400/10"; sText = "text-amber-400 border-amber-400/20";
        } else if (effectiveStatus === "in_progress") {
          status = "In Progress"; sBg = "bg-yellow-400/10"; sText = "text-yellow-400 border-yellow-400/20";
        } else {
          status = "Not Started"; sBg = "bg-slate-500/10"; sText = "text-slate-400 border-slate-600";
        }
        statusBadge.className = "px-3 py-1 rounded-lg text-xs font-bold border " + sBg + " " + sText;
        statusBadge.textContent = status;

        // Date
        var dateEl = document.getElementById("detail-date");
        if (sub && sub.submittedAt) {
          var d2 = sub.submittedAt.toDate ? sub.submittedAt.toDate() : 
                   (sub.submittedAt.seconds ? new Date(sub.submittedAt.seconds * 1000) : new Date(sub.submittedAt));
          if (isNaN(d2.getTime())) {
            dateEl.textContent = "Submitted";
          } else {
            dateEl.textContent = "Submitted " + d2.toLocaleDateString();
          }
        } else { dateEl.textContent = ""; }

        // Stats grid
        var statsEl = document.getElementById("detail-stats");
        statsEl.innerHTML = "";
        var stats = [];

        var pct = getProgressPct(sub);
        stats.push({ icon: "trending_up", bg: "color-mix(in srgb, var(--accent) 10%, transparent)", color: "var(--accent)", label: "Progress", value: pct + "%", extra: '<div class="progress-track"><div class="progress-fill" style="width:' + pct + '%"></div></div>' });

        if (sceneSummary) {
          stats.push({ icon: "scene", bg: "rgba(99,102,241,0.1)", color: "#6366f1", label: "Scenes", value: sceneSummary.submittedOrDoneCount + " / " + sceneSummary.totalSceneCount });
        }

        if (sub && sub.quizScore != null) {
          stats.push({ icon: "quiz", bg: "color-mix(in srgb, var(--accent) 10%, transparent)", color: "var(--accent)", label: "Quiz Score", value: sub.quizScore + "%" });
        }

        if (sub && sub.experimentState && sub.experimentState.completedSteps != null) {
          stats.push({ icon: "checklist", bg: "rgba(99,102,241,0.1)", color: "#6366f1", label: "Steps", value: sub.experimentState.completedSteps + " / " + (sub.experimentState.totalSteps || "?") });
        }

        if (stats.length % 2 !== 0) {
          stats.push({ icon: "science", bg: "color-mix(in srgb, var(--accent) 10%, transparent)", color: "var(--accent)", label: "Scenes", value: "AR" });
        }

        stats.forEach(function (s) {
          var div = document.createElement("div");
          div.className = "detail-stat";
          div.innerHTML =
            '<div class="ds-icon" style="background:' + s.bg + ';color:' + s.color + '">' +
              '<span class="material-symbols-outlined" style="font-size:20px">' + s.icon + '</span>' +
            '</div>' +
            '<div style="flex:1;min-width:0">' +
              '<div class="ds-label">' + s.label + '</div>' +
              '<div class="ds-value">' + s.value + '</div>' +
              (s.extra || '') +
            '</div>';
          statsEl.appendChild(div);
        });

        // Description
        var descSection = document.getElementById("detail-desc-section");
        var descText = exp.description || "";
        if (descText) {
          descSection.classList.remove("hidden");
          document.getElementById("detail-desc").textContent = descText;
        } else { descSection.classList.add("hidden"); }

        // Instructor Feedback
        var fbSection = document.getElementById("detail-feedback-section");
        var feedbackText = getPrimaryFeedback(sub);
        if (feedbackText) {
          fbSection.classList.remove("hidden");
          document.getElementById("detail-feedback").textContent = feedbackText;
        } else { fbSection.classList.add("hidden"); }

        // AR button label
        var arLabel = document.getElementById("detail-ar-label");
        if (effectiveStatus === "graded" || effectiveStatus === "correct") {
          arLabel.textContent = "Review Session";
        } else if (effectiveStatus === "submitted") {
          arLabel.textContent = "View Submission";
        } else if (effectiveStatus === "needs_revision") {
          arLabel.textContent = "Retake Scene";
        } else if (effectiveStatus === "in_progress") {
          arLabel.textContent = "Continue AR";
        } else {
          arLabel.textContent = "Launch AR";
        }

        expDetailScreen.classList.add("open");
        detailLaunchBar.classList.add("open");
      }

      function closeExpDetail() {
        expDetailScreen.classList.remove("open");
        detailLaunchBar.classList.remove("open");
        currentDetailExp = null;
      }

      document.getElementById("detail-back").addEventListener("click", function (e) {
        e.preventDefault();
        closeExpDetail();
      });

      document.getElementById("detail-ar-btn").addEventListener("click", function (e) {
        e.preventDefault();
        if (!currentDetailExp) return;
        var sub = currentDetailExp.submission;
        var mode = resolveLaunchMode(sub);
        var classroomId = currentDetailExp.classroomId || (currentDetailExp.classroom && currentDetailExp.classroom.id) || null;
        var modelUsername = (currentDetailExp.classroom && currentDetailExp.classroom.instructorId) || currentDetailExp.instructorId || null;
        
        // Show loading state on button
        this.disabled = true;
        this.innerHTML = '<span class="material-symbols-outlined text-lg animate-spin">progress_activity</span> Launching AR...';
        
        parent.postMessage("unity:start_ar:" + JSON.stringify({ 
          experimentId: currentDetailExp.id, 
          title: currentDetailExp.title || currentDetailExp.name, 
          mode: mode,
          classroomId: classroomId,
          instructorId: modelUsername,
          modelUsername: modelUsername
        }), "*");
      });

      function renderAssignments(experiments) {
        var list = document.getElementById("assignments-list");
        var skeletons = document.getElementById("skeleton-container");
        var empty = document.getElementById("empty-state");
        if (skeletons) skeletons.remove();

        var countEl = document.getElementById("total-count");

        if (!experiments || experiments.length === 0) {
          if (countEl) countEl.textContent = "0 Total";
          empty.classList.remove("hidden");
          return;
        }
        empty.classList.add("hidden");
        if (countEl) countEl.textContent = experiments.length + " Total";

        experiments.forEach(function (exp) {
          var sub = exp.submission;
           var effectiveStatus = getEffectiveStatus(sub);
           var sceneSummaryLabel = getSceneSummaryText(sub);

          var statusIcon, statusColor, statusLabel, btnLabel;
           if (effectiveStatus === "graded" || effectiveStatus === "correct") {
             statusIcon  = "workspace_premium";
             statusLabel = "Graded";
             statusColor = "text-accent-success";
             btnLabel    = "Review Session";
           } else if (effectiveStatus === "submitted") {
             statusIcon  = "schedule_send";
             statusLabel = "Submitted";
             statusColor = "text-cyan-400";
             btnLabel    = "View Submission";
           } else if (effectiveStatus === "needs_revision") {
             statusIcon  = "refresh";
             statusLabel = "Needs Revision";
             statusColor = "text-amber-400";
             btnLabel    = "Retake Scene";
           } else if (effectiveStatus === "in_progress") {
             statusIcon  = "trending_up";
             statusLabel = "In Progress";
             statusColor = "text-amber-400";
             btnLabel    = "Continue AR";
          } else {
             statusIcon  = "play_circle";
             statusLabel = "Not Started";
             statusColor = "text-slate-400";
             btnLabel    = "Launch AR";
          }

          var pct = getProgressPct(sub);
          // Submissions might not have classroomName if fetched directly, but exp has it
          var classroomName = (exp.classroom && exp.classroom.name) || (sub && sub.classroomName) || "";

          var card = document.createElement("div");
          card.className = "glass-panel p-4 rounded-xl flex flex-col gap-4 transition-transform active:scale-[0.98] mb-4";
          card.innerHTML =
            '<div class="flex items-center gap-4">' +
              '<div class="shrink-0">' +
                '<div class="size-16 rounded-lg bg-gradient-to-br from-primary/20 to-blue-600/20 flex items-center justify-center border border-primary/30">' +
                  '<span class="material-symbols-outlined text-3xl ' + statusColor + '">' + statusIcon + '</span>' +
                '</div>' +
              '</div>' +
              '<div class="flex-1 min-w-0">' +
                '<span class="text-[10px] font-bold text-primary uppercase tracking-widest">' + esc(classroomName) + '</span>' +
                '<h3 class="text-base font-bold text-white leading-tight truncate">' + esc(exp.title || exp.name || "Experiment") + '</h3>' +
                '<div class="flex items-center mt-1 gap-1.5">' +
                  '<span class="text-xs font-bold ' + statusColor + ' uppercase tracking-wider">' + statusLabel + '</span>' +
                '</div>' +
                '<p class="text-[11px] text-slate-400 mt-1 line-clamp-1">' + esc(sceneSummaryLabel) + '</p>' +
              '</div>' +
              '<div class="shrink-0">' +
                '<span class="material-symbols-outlined text-slate-600">chevron_right</span>' +
              '</div>' +
            '</div>' +
            (pct > 0 ? '<div class="progress-track"><div class="progress-fill" style="width:' + pct + '%"></div></div>' : '') +
            '<button class="ar-btn w-full bg-primary hover:bg-primary/90 text-background-dark font-bold py-2.5 rounded-lg flex items-center justify-center gap-2 transition-all active:scale-95 text-sm">' +
              '<span class="material-symbols-outlined text-lg">play_arrow</span> ' + btnLabel +
            '</button>';

          // Card tap → detail screen
          (function (capturedExp) {
            card.addEventListener("click", function () {
              openExpDetail(capturedExp);
            });
          })(exp);

          // AR button keeps direct launch
          (function(capturedSub) {
            card.querySelector(".ar-btn").addEventListener("click", function (e) {
              e.stopPropagation();
              var mode = resolveLaunchMode(capturedSub);
              var classroomId = exp.classroomId || (exp.classroom && exp.classroom.id) || null;
              var modelUsername = (exp.classroom && exp.classroom.instructorId) || exp.instructorId || null;
              parent.postMessage("unity:start_ar:" + JSON.stringify({ 
                experimentId: exp.id, 
                title: exp.title || exp.name, 
                mode: mode,
                classroomId: classroomId,
                instructorId: modelUsername,
                modelUsername: modelUsername
              }), "*");
            });
          })(sub);
          list.appendChild(card);
        });
      }

      window.addEventListener("message", function (e) {
        var d = e.data;
        if (d && typeof d === "object" && d.type === "assignments") renderAssignments(d.data);
      });
    })();
    </script>
<script src="preferences.js"></script>
</body>

</html>
