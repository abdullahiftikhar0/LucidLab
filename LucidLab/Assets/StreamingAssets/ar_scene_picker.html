<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Select Scene</title>
  <link rel="stylesheet" href="fonts/fonts.css" />
  <style>
    :root {
      --primary: #00f2ff;
      --bg: rgba(15, 34, 35, 0.94);
      --text: #f1f5f9;
      --muted: #94a3b8;
      --ok: #10b981;
      --warn: #f59e0b;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Inter, system-ui, sans-serif;
      background: transparent;
      color: var(--text);
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.72);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .panel {
      width: 100%;
      max-width: 540px;
      max-height: calc(100dvh - 40px);
      background: var(--bg);
      border: 1px solid rgba(0, 242, 255, 0.22);
      border-radius: 18px;
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.48);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      padding: 18px 18px 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .title {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.01em;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
    }

    .scene-list {
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .scene-card {
      display: flex;
      gap: 12px;
      padding: 12px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.03);
    }

    .scene-thumb {
      width: 64px;
      height: 64px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(2, 6, 23, 0.5);
      object-fit: cover;
      flex-shrink: 0;
    }

    .scene-thumb.placeholder {
      display: grid;
      place-items: center;
      color: var(--muted);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      text-align: center;
      line-height: 1.3;
      padding: 6px;
    }

    .scene-main {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .scene-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .scene-name {
      font-size: 14px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .scene-index {
      font-size: 10px;
      color: var(--muted);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      flex-shrink: 0;
    }

    .scene-meta {
      font-size: 11px;
      color: #cbd5e1;
      line-height: 1.45;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      width: fit-content;
    }

    .pill.marker {
      color: var(--ok);
      border: 1px solid rgba(16, 185, 129, 0.4);
      background: rgba(16, 185, 129, 0.1);
    }

    .pill.plane {
      color: var(--warn);
      border: 1px solid rgba(245, 158, 11, 0.4);
      background: rgba(245, 158, 11, 0.1);
    }

    .scene-actions {
      margin-top: auto;
      display: flex;
      justify-content: flex-end;
    }

    .select-btn {
      border: none;
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      background: var(--primary);
      color: #072024;
      transition: opacity 0.2s ease;
    }

    .select-btn:active {
      opacity: 0.85;
    }

    .empty {
      padding: 28px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="overlay">
    <div class="panel">
      <div class="header">
        <div class="title">Select Scene</div>
        <div class="subtitle">
          Choose the scene to load. Scenes with a marker use marker mode. Scenes without a marker start in plane mode.
        </div>
      </div>
      <div id="scene-list" class="scene-list">
        <div class="empty">Loading scenes...</div>
      </div>
    </div>
  </div>

  <script>
    function sendToUnity(msg) {
      if (window.Unity && window.Unity.call) {
        window.Unity.call(msg);
      } else if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.unityControl) {
        window.webkit.messageHandlers.unityControl.postMessage(msg);
      } else {
        window.location = "unity:" + msg;
      }
    }

    function esc(text) {
      var div = document.createElement("div");
      div.appendChild(document.createTextNode(text == null ? "" : String(text)));
      return div.innerHTML;
    }

    function renderScenes(data) {
      var list = document.getElementById("scene-list");
      list.innerHTML = "";

      var scenes = data && Array.isArray(data.scenes) ? data.scenes.slice() : [];
      scenes.sort(function(a, b) {
        return Number(a.index || 0) - Number(b.index || 0);
      });

      if (!scenes.length) {
        list.innerHTML = '<div class="empty">No scenes available for this experiment.</div>';
        return;
      }

      scenes.forEach(function(scene) {
        var hasMarker = !!scene.hasMarker;
        var markerName = scene.markerName || "";
        var markerImageUrl = scene.markerImageUrl || "";
        var markerCount = Number(scene.markerCount || 0);
        var sceneName = scene.name || "Untitled Scene";

        var card = document.createElement("div");
        card.className = "scene-card";

        var thumb = "";
        if (markerImageUrl) {
          thumb = '<img class="scene-thumb" src="' + esc(markerImageUrl) + '" alt="Marker" />';
        } else {
          thumb = '<div class="scene-thumb placeholder">' + (hasMarker ? "Marker" : "Plane") + '</div>';
        }

        var pill = hasMarker
          ? '<span class="pill marker">Marker Mode</span>'
          : '<span class="pill plane">Plane Mode</span>';

        var markerText = hasMarker
          ? ('Marker: ' + esc(markerName || (markerCount + ' marker' + (markerCount === 1 ? '' : 's'))))
          : 'No marker assigned for this scene';

        card.innerHTML =
          thumb +
          '<div class="scene-main">' +
            '<div class="scene-top">' +
              '<div class="scene-name">' + esc(sceneName) + '</div>' +
              '<div class="scene-index">Scene ' + esc(scene.index == null ? "-" : scene.index) + '</div>' +
            '</div>' +
            pill +
            '<div class="scene-meta">' + markerText + '</div>' +
            '<div class="scene-actions">' +
              '<button class="select-btn" data-scene-name="' + encodeURIComponent(sceneName) + '">Start Scene</button>' +
            '</div>' +
          '</div>';

        list.appendChild(card);
      });

      var buttons = list.querySelectorAll(".select-btn");
      buttons.forEach(function(btn) {
        btn.addEventListener("click", function() {
          var encodedSceneName = btn.getAttribute("data-scene-name") || "";
          sendToUnity("scene_picker_select:" + encodedSceneName);
        });
      });
    }

    window.addEventListener("message", function(event) {
      var data = event.data;
      if (!data || typeof data !== "object") return;
      if (data.type !== "scene_picker_context") return;
      renderScenes(data);
    });

    sendToUnity("scene_picker_ready");
  </script>
</body>
</html>
