services:
  - type: web
    name: lucidlab-backend
    runtime: docker
    plan: starter
    region: oregon
    rootDir: backend
    dockerfilePath: Dockerfile
    dockerContext: .
    # Lightweight liveness probe (204, no body). Use /ping for external keep-alive cron too.
    healthCheckPath: /ping
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.4-mini
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SKETCHFAB_API_TOKEN
        sync: false