<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>LucidLab - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#00f2ff",
                        "background-light": "#f5f8f8",
                        "background-dark": "#0f2223",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .glass-morphism {
            background: rgba(15, 34, 35, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 242, 255, 0.1);
        }
        .bg-glow {
            background: radial-gradient(circle at top right, rgba(0, 242, 255, 0.15), transparent),
                        radial-gradient(circle at bottom left, rgba(88, 28, 135, 0.2), transparent);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col font-display">
<!-- Background Elements -->
<div class="fixed inset-0 z-0 bg-glow pointer-events-none"></div>
<div class="relative z-10 flex flex-col items-center justify-center min-h-screen p-6 w-full max-w-md mx-auto">
<!-- Top Branded Area -->
<div class="flex flex-col items-center mb-10">
<div class="w-24 h-24 mb-4 flex items-center justify-center rounded-2xl bg-primary/10 border border-primary/20 shadow-[0_0_30px_rgba(0,242,255,0.2)]">
<span class="material-symbols-outlined text-primary !text-6xl">
                    view_in_ar
                </span>
</div>
<h1 class="text-4xl font-bold tracking-tight text-slate-900 dark:text-slate-100 flex items-center gap-2">
                Lucid<span class="text-primary">Lab</span>
</h1>
<p class="text-slate-500 dark:text-primary/60 font-medium mt-2">AR Science Education</p>
</div>
<!-- Glassmorphic Login Card -->
<div class="glass-morphism w-full p-8 rounded-xl shadow-2xl">
<h2 class="text-xl font-bold mb-6 text-center">Welcome Back</h2>
<form class="space-y-5">
<!-- Email Field -->
<div class="flex flex-col gap-2">
<label class="text-sm font-medium text-slate-400">Student Email</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-500 group-focus-within:text-primary">
<span class="material-symbols-outlined">mail</span>
</div>
<input class="w-full h-12 pl-10 pr-10 bg-background-dark/50 border border-slate-700 rounded-lg text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all" placeholder="name@school.edu" type="email"/>
<div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none text-emerald-500">
<span class="material-symbols-outlined !text-xl">check_circle</span>
</div>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center">
<label class="text-sm font-medium text-slate-400">Password</label>
<a class="text-xs font-semibold text-primary hover:underline" href="#">Forgot Password?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-500 group-focus-within:text-primary">
<span class="material-symbols-outlined">lock</span>
</div>
<input class="w-full h-12 pl-10 pr-10 bg-background-dark/50 border border-slate-700 rounded-lg text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-500 hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined !text-xl">visibility</span>
</button>
</div>
</div>
<!-- Primary Action -->
<button class="w-full h-12 bg-primary hover:bg-primary/90 text-background-dark font-bold rounded-lg shadow-[0_0_20px_rgba(0,242,255,0.4)] transition-all transform active:scale-[0.98] mt-2" type="submit">
                    LOG IN
                </button>
<!-- Divider -->
<div class="relative py-4 flex items-center">
<div class="flex-grow border-t border-slate-700"></div>
<span class="flex-shrink mx-4 text-slate-500 text-xs font-bold uppercase tracking-widest">or</span>
<div class="flex-grow border-t border-slate-700"></div>
</div>
<!-- Google Sign In -->
<button class="w-full h-12 bg-white/5 hover:bg-white/10 border border-slate-700 text-slate-100 font-medium rounded-lg flex items-center justify-center gap-3 transition-all" type="button">
<svg class="w-5 h-5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                    Continue with Google
                </button>
</form>
</div>
<!-- Bottom Toggle -->
<div class="mt-8 text-center">
<p class="text-slate-500 text-sm">
                Don't have an account? 
                <a class="text-primary font-bold hover:underline ml-1" href="#">Register here</a>
</p>
</div>
<!-- Labs Decor -->
<div class="mt-auto pt-10 pb-6 opacity-20 pointer-events-none flex gap-8 grayscale">
<span class="material-symbols-outlined text-4xl">science</span>
<span class="material-symbols-outlined text-4xl">biotech</span>
<span class="material-symbols-outlined text-4xl">precision_manufacturing</span>
<span class="material-symbols-outlined text-4xl">hub</span>
</div>
</div>
</body></html>
